<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Coffee</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

/* MODEL */
model-viewer {
  width: 100%;
  height: 40vh;
}

/* BOX */
.glass {
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 12px;
}

/* BUTTON */
button {
  padding: 8px 14px;
  border-radius: 20px;
  background: #6f4e37;
  color: white;
  border: none;
  margin: 3px;
}

/* FLOAT BUTTONS */
#cartBtn, #adminBtn {
  position: fixed;
  bottom: 20px;
  border-radius: 50%;
  padding: 14px;
}

#cartBtn { right: 20px; }
#adminBtn { left: 20px; background:#222; }

/* SIDE PANELS */
.panel {
  position: fixed;
  top: 0;
  width: 85%;
  max-width: 400px;
  height: 100%;
  background: white;
  overflow-y: auto;
  transition: 0.3s;
  z-index: 10;
}

/* CART RIGHT */
#cartPanel {
  right: -100%;
}
#cartPanel.active {
  right: 0;
}

/* ADMIN LEFT */
#adminPanel {
  left: -100%;
}
#adminPanel.active {
  left: 0;
}

.item {
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}
</style>
</head>

<body>

<!-- MODEL -->
<model-viewer 
  id="viewer" 
  src="matchaCat.glb" 
  camera-controls 
  auto-rotate
  shadow-intensity="1"
  exposure="1"
  environment-image="neutral">
</model-viewer>

<!-- CATEGORY -->
<div class="glass">
  <button onclick="switchCategory('drinks')">☕ Drinks</button>
  <button onclick="switchCategory('cookies')">🍪 Cookies</button>
</div>

<!-- MENU -->
<div class="glass" id="menuButtons"></div>

<!-- ITEM -->
<div class="glass">
  <h3 id="title"></h3>
  <strong id="price"></strong><br><br>
  <button onclick="addToCart()">Add</button>
  <p id="liveTotal">Cart: RM 0</p>
</div>

<!-- FLOAT BUTTONS -->
<button id="cartBtn" onclick="toggleCart()">🛒</button>
<button id="adminBtn" onclick="toggleAdmin()">📊</button>

<!-- CART PANEL -->
<div id="cartPanel" class="panel">
  <div style="padding:20px;">
    <h2>🧾 Cart</h2>

    <input id="customerName" placeholder="Name"><br><br>
    <input id="tableNo" placeholder="Table"><br><br>

    <div id="orderList"></div>
    <h3 id="total"></h3>

    <button onclick="checkout()">Checkout</button>
    <button onclick="toggleCart()">Close</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="panel">
  <div style="padding:20px;">
    <h2>📊 Dashboard</h2>

    <h3 id="totalOrders"></h3>
    <h3 id="totalRevenue"></h3>

    <div id="adminOrders"></div>

    <br>
    <button onclick="clearOrders()">🗑 Clear</button>
    <button onclick="toggleAdmin()">Close</button>
  </div>
</div>

<script>
let cart=[];
let currentCategory="drinks";
let currentItem="";

/* MENU */
const menu = {
  drinks: {
    coffeeBear:{title:"Coffee Bear",price:14,src:"coffeeBear.glb"},
    coffeeCup:{title:"Coffee Cup",price:10,src:"coffeeCup.glb"},
    coffeeCupsPoly:{title:"Coffee Cups (Low Poly)",price:9,src:"coffeeCupsPoly.glb"},
    matchaCat:{title:"Matcha Cat",price:12,src:"matchaCat.glb"},
    mochaCat:{title:"Mocha Cat",price:13,src:"mochaCat.glb"}
  },
  cookies: {
    polyCookies:{title:"Cookies (Low Poly)",price:6,src:"polyCookies.glb"}
  }
};

/* INIT */
window.onload = () => {
  loadMenu();
  loadItem(Object.keys(menu[currentCategory])[0]);
};

/* MENU */
function loadMenu(){
  const menuButtons=document.getElementById("menuButtons");
  menuButtons.innerHTML="";

  Object.keys(menu[currentCategory]).forEach(key=>{
    const btn=document.createElement("button");
    btn.textContent=menu[currentCategory][key].title;
    btn.onclick=()=>loadItem(key);
    menuButtons.appendChild(btn);
  });
}

function switchCategory(cat){
  currentCategory=cat;
  loadMenu();
  loadItem(Object.keys(menu[currentCategory])[0]);
}

function loadItem(key){
  currentItem=key;
  const d=menu[currentCategory][key];

  viewer.src=d.src;
  title.textContent=d.title;
  price.textContent="RM "+d.price;
}

/* CART */
function addToCart(){
  const d=menu[currentCategory][currentItem];
  const exist=cart.find(i=>i.title===d.title);

  if(exist) exist.qty++;
  else cart.push({...d,qty:1});

  updateLiveTotal();
}

function updateLiveTotal(){
  let sum=0;
  cart.forEach(i=>sum+=i.price*i.qty);
  liveTotal.textContent="Cart: RM "+sum;
}

/* PANEL TOGGLE */
function toggleCart(){
  cartPanel.classList.toggle("active");
  renderCart();
}

function toggleAdmin(){
  adminPanel.classList.toggle("active");
  loadAdmin();
}

/* RENDER CART */
function renderCart(){
  orderList.innerHTML="";
  let sum=0;

  cart.forEach((item,i)=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`
      ${item.title} x${item.qty}
      RM ${item.price*item.qty}
      <button onclick="removeItem(${i})">X</button>
    `;
    orderList.appendChild(div);
    sum+=item.price*item.qty;
  });

  total.textContent="Total: RM "+sum;
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
  updateLiveTotal();
}

/* CHECKOUT */
function checkout(){
  const name=customerName.value || "Guest";
  const table=tableNo.value || "-";
  const orderId="ORD"+Math.floor(Math.random()*100000);

  const orders=JSON.parse(localStorage.getItem("orders")||"[]");

  orders.push({
    orderId,
    name,
    table,
    cart: JSON.parse(JSON.stringify(cart))
  });

  localStorage.setItem("orders",JSON.stringify(orders));

  alert("✅ Order Sent!");

  cart=[];
  updateLiveTotal();
  toggleCart();
}

/* ADMIN */
function loadAdmin(){
  const orders = JSON.parse(localStorage.getItem("orders") || "[]");

  adminOrders.innerHTML="";
  let totalRevenue=0;

  orders.forEach(order=>{
    let orderTotal=0;

    const items=order.cart.map(i=>{
      orderTotal+=i.price*i.qty;
      return `${i.title} x${i.qty}`;
    }).join("<br>");

    totalRevenue+=orderTotal;

    const div=document.createElement("div");
    div.style.borderBottom="1px solid #ccc";
    div.innerHTML=`
      <strong>${order.orderId}</strong><br>
      ${order.name} | Table ${order.table}<br>
      ${items}<br>
      💰 RM ${orderTotal}
    `;
    adminOrders.appendChild(div);
  });

  totalOrders.textContent="Total Orders: "+orders.length;
  totalRevenue.textContent="Total Sales: RM "+totalRevenue;
}

function clearOrders(){
  if(confirm("Delete all data?")){
    localStorage.removeItem("orders");
    loadAdmin();
  }
}
</script>

</body>
</html>
