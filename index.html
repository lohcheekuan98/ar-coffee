<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Coffee</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #f7f3ef;
}

/* START */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #6f4e37;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#app { display: none; }

header {
  background: #6f4e37;
  color: white;
  padding: 14px;
  text-align: center;
}

model-viewer {
  width: 100%;
  height: 50vh;
}

/* BUTTONS */
.buttons {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  padding: 10px;
}

button {
  padding: 8px 14px;
  border-radius: 20px;
  border: none;
  background: #6f4e37;
  color: white;
  cursor: pointer;
  opacity: 0.8;
}

button.active {
  opacity: 1;
  transform: scale(1.05);
}

/* ORDER */
#orderBtn {
  width: 90%;
  margin: 10px auto;
  display: block;
  padding: 12px;
  border-radius: 10px;
  background: #3b2f2f;
}

/* CART BTN */
#cartBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #3b2f2f;
  padding: 14px;
  border-radius: 50%;
  font-size: 18px;
}

/* RECEIPT */
#summaryPage {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #fff;
  display: none;
  padding: 20px;
  overflow: auto;
}

.receipt {
  max-width: 400px;
  margin: auto;
}

.receipt h2 {
  text-align: center;
}

.item {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
  align-items: center;
}

.qty {
  display: flex;
  gap: 5px;
}

.qty button {
  padding: 4px 8px;
  font-size: 12px;
}

.delete {
  background: red;
}

.total {
  border-top: 1px dashed #000;
  margin-top: 15px;
  padding-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="startScreen">
  <h1>☕ AR Coffee</h1>
  <button onclick="startApp()">Start</button>
</div>

<div id="app">

<header>☕ AR Coffee</header>

<model-viewer id="viewer" src="matchaCat.glb" ar camera-controls auto-rotate></model-viewer>

<div class="buttons" id="categoryButtons">
  <button onclick="switchCategory('drinks', this)" class="active">☕</button>
  <button onclick="switchCategory('cookies', this)">🍪</button>
  <button onclick="switchCategory('chocolate', this)">🍫</button>
</div>

<div class="buttons" id="drinkButtons"></div>

<h3 id="title"></h3>
<p id="desc"></p>
<strong id="price"></strong>

<button id="orderBtn" onclick="addToCart()">Add to Cart</button>

</div>

<button id="cartBtn" onclick="openSummary()">🛒</button>

<!-- RECEIPT -->
<div id="summaryPage">
  <div class="receipt">
    <h2>🧾 AR Coffee Receipt</h2>
    <div id="orderList"></div>
    <div class="total" id="total"></div>

    <button onclick="checkout()">Checkout WhatsApp</button>
    <button onclick="closeSummary()">Close</button>
  </div>
</div>

<script>
let currentCategory = "drinks";
let currentItem = "";
let cart = [];

const menu = {
  drinks: {
    matcha: { src:"matchaCat.glb", title:"Matcha", desc:"Matcha latte", price:12 },
    mocha: { src:"mochaCat.glb", title:"Mocha", desc:"Chocolate coffee", price:13 }
  },
  cookies: {
    cookie1: { src:"matchaCat.glb", title:"Cookie", desc:"Sweet cookie", price:6 }
  },
  chocolate: {
    choco1: { src:"matchaCat.glb", title:"Hot Choco", desc:"Cocoa drink", price:10 }
  }
};

function startApp() {
  startScreen.style.display = "none";
  app.style.display = "block";
}

function generateMenu() {
  const container = drinkButtons;
  container.innerHTML = "";

  Object.keys(menu[currentCategory]).forEach((key,i)=>{
    const btn = document.createElement("button");
    btn.textContent = menu[currentCategory][key].title;

    if(i===0){ btn.classList.add("active"); loadItem(key,btn,true); }

    btn.onclick = ()=>loadItem(key,btn);
    container.appendChild(btn);
  });
}

function switchCategory(cat,btn){
  currentCategory = cat;
  document.querySelectorAll("#categoryButtons button")
    .forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  generateMenu();
}

function loadItem(key,btn,auto=false){
  currentItem = key;

  if(!auto){
    document.querySelectorAll("#drinkButtons button")
      .forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }

  const d = menu[currentCategory][key];

  viewer.src = d.src;
  title.textContent = d.title;
  desc.textContent = d.desc;
  price.textContent = "RM "+d.price;
}

/* CART LOGIC */
function addToCart(){
  const d = menu[currentCategory][currentItem];

  const existing = cart.find(i=>i.title===d.title);

  if(existing){
    existing.qty++;
  }else{
    cart.push({...d, qty:1});
  }

  alert(d.title+" added!");
}

/* RECEIPT */
function openSummary(){
  summaryPage.style.display="block";
  renderCart();
}

function renderCart(){
  orderList.innerHTML="";
  let total=0;

  cart.forEach((item,index)=>{
    const div=document.createElement("div");
    div.className="item";

    div.innerHTML=`
      <span>${item.title}</span>
      <div class="qty">
        <button onclick="changeQty(${index},-1)">-</button>
        <span>${item.qty}</span>
        <button onclick="changeQty(${index},1)">+</button>
      </div>
      <span>RM ${item.price*item.qty}</span>
      <button class="delete" onclick="removeItem(${index})">X</button>
    `;

    orderList.appendChild(div);
    total += item.price*item.qty;
  });

  totalDiv = document.getElementById("total");
  totalDiv.textContent = "Total: RM "+total;
}

function changeQty(i,delta){
  cart[i].qty += delta;
  if(cart[i].qty<=0) cart.splice(i,1);
  renderCart();
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
}

function closeSummary(){
  summaryPage.style.display="none";
}

/* CHECKOUT */
function checkout(){
  let text="Order:%0A";
  let total=0;

  cart.forEach(item=>{
    text+=`${item.title} x${item.qty} RM ${item.price*item.qty}%0A`;
    total += item.price*item.qty;
  });

  text+=`%0ATotal: RM ${total}`;

  window.open("https://wa.me/60123456789?text="+text);
}

window.onload = generateMenu;
</script>

</body>
</html>
