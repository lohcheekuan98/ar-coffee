<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Coffee - Aesthetic</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #f7f3ef, #e8dfd8);
  color: #3b2f2f;
}

/* START SCREEN */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg,#6f4e37,#3b2f2f);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#startScreen button {
  margin-top: 20px;
  padding: 12px 20px;
  border-radius: 20px;
  background: white;
  color: #6f4e37;
  font-weight: bold;
}

#app { display: none; }

header {
  text-align: center;
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
}

model-viewer {
  width: 100%;
  height: 45vh;
}

/* GLASS PANEL */
.glass {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(12px);
  margin: 10px;
  padding: 10px;
  border-radius: 16px;
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}

button {
  border: none;
  padding: 8px 14px;
  border-radius: 20px;
  background: #6f4e37;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* RIPPLE */
button:active::after {
  content: "";
  position: absolute;
  width: 100px;
  height: 100px;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  transform: scale(2);
  opacity: 0;
  transition: 0.4s;
}

/* FLOAT CART */
#cartBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #3b2f2f;
  padding: 14px;
  border-radius: 50%;
  animation: float 2s infinite;
}

@keyframes float {
  50% { transform: translateY(-6px); }
}

/* RECEIPT */
#summaryPage {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
}

.receipt {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  max-width: 400px;
  margin: 40px auto;
  padding: 20px;
  border-radius: 20px;
}

.item {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}

.total {
  border-top: 1px dashed #000;
  margin-top: 10px;
  padding-top: 10px;
  font-weight: bold;
}

/* ANIMATION */
.fade {
  animation: fade 0.3s ease;
}

@keyframes fade {
  from {opacity:0; transform:translateY(5px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div id="startScreen">
  <h1>☕ AR Coffee</h1>
  <p>Experience your drink in AR</p>
  <button onclick="startApp()">Start Experience</button>
</div>

<div id="app">

<header>☕ AR Coffee</header>

<model-viewer id="viewer" src="matchaCat.glb" ar camera-controls auto-rotate></model-viewer>

<div class="glass">
  <div class="buttons">
    <button onclick="switchCategory('drinks')">☕</button>
    <button onclick="switchCategory('cookies')">🍪</button>
    <button onclick="switchCategory('chocolate')">🍫</button>
  </div>
</div>

<div class="glass">
  <div class="buttons" id="menuButtons"></div>
</div>

<div class="glass">
  <h3 id="title"></h3>
  <p id="desc"></p>
  <strong id="price"></strong>
  <button onclick="addToCart()">Add to Cart</button>
</div>

</div>

<button id="cartBtn" onclick="openSummary()">🛒</button>

<!-- RECEIPT -->
<div id="summaryPage">
  <div class="receipt">
    <h2>🧾 Receipt</h2>

    <input id="customerName" placeholder="Name">
    <input id="tableNo" placeholder="Table">

    <div id="orderList"></div>
    <div class="total" id="total"></div>

    <button onclick="checkout()">Checkout</button>
    <button onclick="closeSummary()">Close</button>
  </div>
</div>

<script>
let cart=[];
let currentCategory="drinks";
let currentItem="";

const menu={
  drinks:{
    matcha:{title:"Matcha",desc:"Smooth matcha latte",price:12,src:"matchaCat.glb"},
    mocha:{title:"Mocha",desc:"Chocolate coffee",price:13,src:"mochaCat.glb"}
  },
  cookies:{
    cookie:{title:"Cookie",desc:"Sweet treat",price:6,src:"matchaCat.glb"}
  },
  chocolate:{
    choco:{title:"Hot Choco",desc:"Warm cocoa",price:10,src:"matchaCat.glb"}
  }
};

function startApp(){
  startScreen.style.display="none";
  app.style.display="block";
  loadMenu();
}

function loadMenu(){
  menuButtons.innerHTML="";
  Object.keys(menu[currentCategory]).forEach((key,i)=>{
    const btn=document.createElement("button");
    btn.textContent=menu[currentCategory][key].title;
    btn.onclick=()=>loadItem(key);
    menuButtons.appendChild(btn);
    if(i===0) loadItem(key);
  });
}

function switchCategory(cat){
  currentCategory=cat;
  loadMenu();
}

function loadItem(key){
  currentItem=key;
  const d=menu[currentCategory][key];

  viewer.cameraOrbit="0deg 75deg 105%";
  setTimeout(()=>viewer.cameraOrbit="0deg 75deg 85%",200);

  title.textContent=d.title;
  desc.textContent=d.desc;
  price.textContent="RM "+d.price;

  title.classList.add("fade");
  desc.classList.add("fade");
  price.classList.add("fade");

  setTimeout(()=>{
    title.classList.remove("fade");
    desc.classList.remove("fade");
    price.classList.remove("fade");
  },300);
}

function addToCart(){
  const d=menu[currentCategory][currentItem];
  const exist=cart.find(i=>i.title===d.title);

  if(exist){exist.qty++;}
  else{cart.push({...d,qty:1});}

  cartBtn.style.transform="scale(1.2)";
  setTimeout(()=>cartBtn.style.transform="scale(1)",200);
}

function openSummary(){
  summaryPage.style.display="block";
  renderCart();
}

function renderCart(){
  if(cart.length===0){
    orderList.innerHTML="<p>No items yet ☕</p>";
    document.getElementById("total").textContent="Total: RM 0";
    return;
  }

  orderList.innerHTML="";
  let total=0;

  cart.forEach((item,i)=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`
      ${item.title} x${item.qty}
      RM ${item.price*item.qty}
      <button onclick="removeItem(${i})">X</button>
    `;
    orderList.appendChild(div);
    total+=item.price*item.qty;
  });

  document.getElementById("total").textContent="Total: RM "+total;
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
}

function closeSummary(){
  summaryPage.style.display="none";
}

function checkout(){
  alert("✨ Order Sent! (Demo Mode)");
  cart=[];
  renderCart();
}

window.onload=loadMenu;
</script>

</body>
</html>
