<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Coffee</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

/* LOCK SCROLL */
body.no-scroll {
  overflow: hidden;
}

/* START SCREEN */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #3b2f2f;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#app { display: none; }

/* MODEL */
model-viewer {
  width: 100%;
  height: 45vh;
}

/* BOX */
.glass {
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 12px;
}

/* BUTTON */
button {
  padding: 8px 14px;
  border-radius: 20px;
  background: #6f4e37;
  color: white;
  border: none;
  margin: 3px;
}

/* CART BTN */
#cartBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  border-radius: 50%;
  padding: 14px;
}

/* RECEIPT */
#summaryPage {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background: rgba(0,0,0,0.4);
  display:none;
  overflow-y:auto;
}

.receipt {
  background:white;
  max-width:400px;
  margin:40px auto;
  padding:20px;
  border-radius:20px;
}

.item {
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

/* SUCCESS */
#successPage {
  position: fixed;
  width:100%;
  height:100%;
  background:#3b2f2f;
  color:white;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
  <h1>☕ AR Coffee</h1>
  <button onclick="startApp()">Start Experience</button>
</div>

<div id="app">

<model-viewer 
  id="viewer" 
  src="matchaCat.glb" 
  camera-controls 
  auto-rotate
  shadow-intensity="1"
  exposure="1"
  environment-image="neutral">
</model-viewer>

<div class="glass">
  <button onclick="switchCategory('drinks')">☕ Drinks</button>
  <button onclick="switchCategory('cookies')">🍪 Cookies</button>
</div>

<div class="glass" id="menuButtons"></div>

<div class="glass">
  <h3 id="title"></h3>
  <strong id="price"></strong><br><br>
  <button onclick="addToCart()">Add</button>
  <p id="liveTotal">Cart: RM 0</p>
</div>

</div>

<button id="cartBtn" onclick="openSummary()">🛒</button>

<!-- RECEIPT -->
<div id="summaryPage">
  <div class="receipt">
    <h2>🧾 Receipt</h2>

    <input id="customerName" placeholder="Name"><br><br>
    <input id="tableNo" placeholder="Table"><br><br>

    <div id="orderList"></div>
    <h3 id="total"></h3>

    <button onclick="checkout()">Checkout</button>
    <button onclick="closeSummary()">Close</button>
  </div>
</div>

<!-- SUCCESS -->
<div id="successPage">
  <h1>✅ Order Sent!</h1>
  <p id="orderInfo"></p>
  <button onclick="restart()">Back</button>
</div>

<script>
let cart=[];
let currentCategory="drinks";
let currentItem="";

/* MENU DATA */
const menu = {
  drinks: {
    coffeeBear:{title:"Coffee Bear",price:14,src:"coffeeBear.glb"},
    coffeeCup:{title:"Coffee Cup",price:10,src:"coffeeCup.glb"},
    coffeeCupsPoly:{title:"Coffee Cups (Low Poly)",price:9,src:"coffeeCupsPoly.glb"},
    matchaCat:{title:"Matcha Cat",price:12,src:"matchaCat.glb"},
    mochaCat:{title:"Mocha Cat",price:13,src:"mochaCat.glb"}
  },
  cookies: {
    polyCookies:{title:"Cookies (Low Poly)",price:6,src:"polyCookies.glb"}
  }
};

/* START */
function startApp(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("app").style.display="block";

  loadMenu();

  const firstKey = Object.keys(menu[currentCategory])[0];
  loadItem(firstKey);
}

/* MENU */
function loadMenu(){
  const menuButtons=document.getElementById("menuButtons");
  menuButtons.innerHTML="";

  Object.keys(menu[currentCategory]).forEach((key)=>{
    const btn=document.createElement("button");
    btn.textContent=menu[currentCategory][key].title;
    btn.onclick=()=>loadItem(key);
    menuButtons.appendChild(btn);
  });
}

function switchCategory(cat){
  currentCategory=cat;
  loadMenu();

  const firstKey = Object.keys(menu[currentCategory])[0];
  loadItem(firstKey);
}

function loadItem(key){
  currentItem=key;
  const d=menu[currentCategory][key];

  document.getElementById("viewer").src=d.src;
  document.getElementById("title").textContent=d.title;
  document.getElementById("price").textContent="RM "+d.price;
}

/* CART */
function addToCart(){
  const d=menu[currentCategory][currentItem];
  const exist=cart.find(i=>i.title===d.title);

  if(exist){exist.qty++;}
  else{cart.push({...d,qty:1});}

  updateLiveTotal();
}

function updateLiveTotal(){
  let sum=0;
  cart.forEach(i=>sum+=i.price*i.qty);
  document.getElementById("liveTotal").textContent="Cart: RM "+sum;
}

function openSummary(){
  document.getElementById("summaryPage").style.display="block";
  document.body.classList.add("no-scroll");
  renderCart();
}

function closeSummary(){
  document.getElementById("summaryPage").style.display="none";
  document.body.classList.remove("no-scroll");
}

function renderCart(){
  const orderList=document.getElementById("orderList");
  const total=document.getElementById("total");

  orderList.innerHTML="";
  let sum=0;

  cart.forEach((item,i)=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`
      ${item.title} x${item.qty}
      RM ${item.price*item.qty}
      <button onclick="removeItem(${i})">X</button>
    `;
    orderList.appendChild(div);
    sum+=item.price*item.qty;
  });

  total.textContent="Total: RM "+sum;
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
  updateLiveTotal();
}

/* CHECKOUT */
function checkout(){
  const name=document.getElementById("customerName").value || "Guest";
  const table=document.getElementById("tableNo").value || "-";
  const orderId="ORD"+Math.floor(Math.random()*100000);

  const orders=JSON.parse(localStorage.getItem("orders")||"[]");

  orders.push({
    orderId,
    name,
    table,
    cart: JSON.parse(JSON.stringify(cart))
  });

  localStorage.setItem("orders",JSON.stringify(orders));

  document.getElementById("summaryPage").style.display="none";
  document.getElementById("successPage").style.display="flex";

  document.getElementById("orderInfo").innerHTML=
    "Order ID: "+orderId+"<br>"+
    cart.map(i=>i.title+" x"+i.qty).join("<br>")+
    "<br><br>☕ Preparing...";

  cart=[];
  updateLiveTotal();
}

/* RESET */
function restart(){
  document.getElementById("successPage").style.display="none";
  document.getElementById("app").style.display="block";
}
</script>

</body>
</html>
