<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AR Café Menu</title>

<script type="module"
  src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #f7f3ef;
  color: #3b2f2f;
}

/* 🔥 START SCREEN */
#startScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #6f4e37;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
}

#startScreen h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

#startScreen p {
  margin-bottom: 20px;
  opacity: 0.9;
}

#startScreen button {
  padding: 10px 18px;
  border-radius: 10px;
  border: none;
  background: white;
  color: #6f4e37;
  cursor: pointer;
}

/* MAIN APP */
#app {
  display: none;
}

header {
  padding: 14px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  background: #6f4e37;
  color: white;
}

model-viewer {
  width: 100%;
  height: 55vh;
  background: #ffffff;
}

.menu {
  padding: 16px;
}

.buttons {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

button {
  padding: 8px 14px;
  font-size: 13px;
  border: none;
  border-radius: 20px;
  background: #6f4e37;
  color: white;
  cursor: pointer;
  opacity: 0.7;
}

button.active {
  opacity: 1;
  background: #5a3d2b;
  transform: scale(1.05);
}
</style>
</head>

<body>

<!-- 🔥 START SCREEN -->
<div id="startScreen">
  <h1>☕ AR Coffee</h1>
  <p>Experience your drinks in AR ✨</p>
  <button onclick="startApp()">Start Experience</button>
</div>

<!-- 🔥 MAIN APP -->
<div id="app">

<header>☕ AR Café Menu</header>

<model-viewer
  id="viewer"
  src="matchaCat.glb"
  ar
  camera-controls
  auto-rotate>
</model-viewer>

<div class="menu">

  <!-- CATEGORY -->
  <div class="buttons" id="categoryButtons">
    <button onclick="switchCategory('drinks', this)" class="active">Drinks</button>
    <button onclick="switchCategory('cookies', this)">Cookies</button>
    <button onclick="switchCategory('chocolate', this)">Chocolate</button>
  </div>

  <!-- ITEMS -->
  <div class="buttons" id="drinkButtons"></div>

  <h3 id="title">...</h3>
  <p id="desc"></p>
  <strong id="price"></strong>

</div>

</div>

<script>
const viewer = document.getElementById("viewer");

let currentCategory = "drinks";
let currentItem = "";

/* 🔥 MENU SYSTEM */
const menu = {
  drinks: {
    matcha: {
      src: "matchaCat.glb",
      title: "Matcha Cat",
      desc: "Creamy Japanese matcha latte.",
      price: "RM 12"
    },
    mocha: {
      src: "mochaCat.glb",
      title: "Mocha Cat",
      desc: "Chocolate espresso blend.",
      price: "RM 13"
    }
  },

  cookies: {
    cookie1: {
      src: "matchaCat.glb", // placeholder
      title: "Choco Cookie",
      desc: "Crunchy and sweet.",
      price: "RM 6"
    }
  },

  chocolate: {
    choco1: {
      src: "matchaCat.glb", // placeholder
      title: "Hot Chocolate",
      desc: "Rich cocoa drink.",
      price: "RM 10"
    }
  }
};

/* 🔥 START APP */
function startApp() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("app").style.display = "block";
}

/* 🔥 GENERATE MENU */
function generateMenu() {
  const container = document.getElementById("drinkButtons");
  container.innerHTML = "";

  const items = menu[currentCategory];

  Object.keys(items).forEach((key, index) => {
    const btn = document.createElement("button");
    btn.textContent = items[key].title.split(" ")[0];

    if (index === 0) {
      btn.classList.add("active");
      loadItem(key, btn, true);
    }

    btn.onclick = () => loadItem(key, btn);

    container.appendChild(btn);
  });
}

/* 🔥 SWITCH CATEGORY */
function switchCategory(category, btn) {
  currentCategory = category;

  document.querySelectorAll("#categoryButtons button")
    .forEach(b => b.classList.remove("active"));

  if (btn) btn.classList.add("active");

  generateMenu();
}

/* 🔥 LOAD ITEM */
function loadItem(type, btn, auto=false) {
  currentItem = type;

  if (!auto) {
    document.querySelectorAll("#drinkButtons button")
      .forEach(b => b.classList.remove("active"));

    if (btn) btn.classList.add("active");
  }

  const d = menu[currentCategory][type];

  viewer.src = d.src || "matchaCat.glb";

  document.getElementById("title").textContent = d.title;
  document.getElementById("desc").textContent = d.desc;
  document.getElementById("price").textContent = d.price;
}

/* INIT */
window.addEventListener("load", () => {
  generateMenu();
});
</script>

</body>
</html>
