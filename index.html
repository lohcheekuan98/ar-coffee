<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Café Menu</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #f7f3ef;
      color: #3b2f2f;
    }

    header {
      padding: 14px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      background: #6f4e37;
      color: white;
    }

    model-viewer {
      width: 100%;
      height: 55vh;
      background: #ffffff;
      transition: opacity 0.25s ease;
    }

    .menu {
      padding: 16px;
    }

    .drink-title {
      font-size: 20px;
      font-weight: bold;
    }

    .drink-desc {
      font-size: 16px;
      margin-top: 6px;
      opacity: 0.85;
    }

    .drink-price {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      background: #6f4e37;
      color: white;
      cursor: pointer;
      opacity: 0.7;
    }

    button.active {
      opacity: 1;
      background: #5a3d2b;
    }

    #loading {
      text-align: center;
      display: none;
      padding: 8px;
      font-size: 14px;
    }

    .hint {
      text-align: center;
      font-size: 13px;
      opacity: 0.7;
      margin-top: 6px;
    }
  </style>
</head>

<body>

<header>☕ AR Café Menu</header>

<model-viewer
  id="viewer"
  src="matchaCat.glb"
  ar
  ar-modes="scene-viewer webxr quick-look"
  camera-controls
  auto-rotate
  exposure="1"
  shadow-intensity="1"
  field-of-view="45deg"
  auto-scale
  camera-target="auto"
  camera-orbit="auto">
</model-viewer>

<div id="loading">Brewing your drink... ☕</div>
<div class="hint">Tap cube icon to view in AR 📦✨</div>

<div class="menu">
  <div class="drink-title" id="title">Matcha Cat</div>
  <div class="drink-desc" id="desc">
    Creamy Japanese matcha latte with a smooth, earthy finish.
  </div>
  <div class="drink-price" id="price">RM 12</div>

  <!-- Drink buttons -->
  <div class="buttons">
    <button onclick="loadDrink('matcha', this)" class="active">Matcha</button>
    <button onclick="loadDrink('mocha', this)">Mocha</button>
  </div>

  <!-- Size buttons -->
  <div class="buttons">
    <button onclick="setSize('S', this)">S</button>
    <button onclick="setSize('M', this)" class="active">M</button>
    <button onclick="setSize('L', this)">L</button>
  </div>

  <!-- Extra controls -->
  <div class="buttons">
    <button onclick="toggleRotate()">Toggle Spin</button>
  </div>
</div>

<script>
  const viewer = document.getElementById("viewer");
  const loading = document.getElementById("loading");

  let currentDrink = "matcha";
  let currentSize = "M";

  const sizeScale = {
    S: 0.8,
    M: 1,
    L: 1.3
  };

  const drinks = {
    matcha: {
      src: "matchaCat.glb",
      baseScale: 1,
      title: "Matcha Cat",
      desc: "Creamy Japanese matcha latte with a smooth, earthy finish.",
      price: "RM 12"
    },
    mocha: {
      src: "mochaCat.glb",
      baseScale: 0.55,
      title: "Mocha Cat",
      desc: "Rich chocolate espresso blend with gentle sweetness.",
      price: "RM 13"
    }
  };

  function applyScale() {
    const d = drinks[currentDrink];
    const finalScale = d.baseScale * sizeScale[currentSize];
    viewer.scale = `${finalScale} ${finalScale} ${finalScale}`;
  }

  function loadDrink(type, btn) {
    currentDrink = type;

    document.querySelectorAll(".buttons button").forEach(b => b.classList.remove("active"));
    if (btn) btn.classList.add("active");

    const d = drinks[type];

    loading.style.display = "block";
    viewer.style.opacity = 0;

    viewer.src = "";

    setTimeout(() => {
      viewer.src = d.src;

      viewer.addEventListener("load", async () => {
        await viewer.updateComplete;

        viewer.cameraTarget = "auto";
        viewer.cameraOrbit = "auto";

        applyScale();

        document.getElementById("title").textContent = d.title;
        document.getElementById("desc").textContent = d.desc;
        document.getElementById("price").textContent = d.price;

        viewer.style.opacity = 1;
        loading.style.display = "none";
      }, { once: true });

    }, 100);
  }

  function setSize(size, btn) {
    currentSize = size;

    document.querySelectorAll(".buttons:nth-child(2) button").forEach(b => b.classList.remove("active"));
    if (btn) btn.classList.add("active");

    applyScale();
  }

  function toggleRotate() {
    viewer.autoRotate = !viewer.autoRotate;
  }

  window.addEventListener("load", () => {
    applyScale();
  });
</script>

</body>
</html>
