<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Coffee - Final Boss</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #f7f3ef;
}

/* START SCREEN */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #6f4e37;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#app { display: none; }

header {
  background: #6f4e37;
  color: white;
  padding: 14px;
  text-align: center;
}

model-viewer {
  width: 100%;
  height: 50vh;
}

/* BUTTONS */
.buttons {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  padding: 10px;
}

button {
  padding: 8px 14px;
  border-radius: 20px;
  border: none;
  background: #6f4e37;
  color: white;
  cursor: pointer;
}

/* CART BTN */
#cartBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #3b2f2f;
  padding: 14px;
  border-radius: 50%;
  font-size: 18px;
}

/* SUMMARY */
#summaryPage {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  display: none;
  padding: 20px;
  overflow: auto;
}

.receipt {
  max-width: 400px;
  margin: auto;
}

.item {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}

.qty button {
  padding: 4px 8px;
}

.delete { background: red; }

.total {
  border-top: 1px dashed #000;
  margin-top: 10px;
  padding-top: 10px;
  font-weight: bold;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<div id="startScreen">
  <h1>☕ AR Coffee</h1>
  <button onclick="startApp()">Start Experience</button>
</div>

<div id="app">

<header>☕ AR Coffee</header>

<model-viewer id="viewer" src="matchaCat.glb" ar camera-controls auto-rotate></model-viewer>

<div class="buttons">
  <button onclick="switchCategory('drinks')">☕</button>
  <button onclick="switchCategory('cookies')">🍪</button>
  <button onclick="switchCategory('chocolate')">🍫</button>
</div>

<div class="buttons" id="menuButtons"></div>

<h3 id="title"></h3>
<p id="desc"></p>
<strong id="price"></strong>

<button onclick="addToCart()">Add to Cart</button>

</div>

<button id="cartBtn" onclick="openSummary()">🛒</button>

<!-- SUMMARY -->
<div id="summaryPage">
  <div class="receipt">
    <h2>🧾 Receipt</h2>

    <input id="customerName" placeholder="Customer Name">
    <input id="tableNo" placeholder="Table No">

    <div id="orderList"></div>
    <div class="total" id="total"></div>

    <p id="time"></p>

    <button onclick="checkout()">Checkout WhatsApp</button>
    <button onclick="closeSummary()">Close</button>
  </div>
</div>

<script>
let cart = [];
let currentCategory = "drinks";
let currentItem = "";

const menu = {
  drinks: {
    matcha:{title:"Matcha",desc:"Matcha Latte",price:12,src:"matchaCat.glb"},
    mocha:{title:"Mocha",desc:"Chocolate Coffee",price:13,src:"mochaCat.glb"}
  },
  cookies:{
    cookie:{title:"Cookie",desc:"Sweet Cookie",price:6,src:"matchaCat.glb"}
  },
  chocolate:{
    choco:{title:"Hot Choco",desc:"Cocoa Drink",price:10,src:"matchaCat.glb"}
  }
};

function startApp(){
  startScreen.style.display="none";
  app.style.display="block";
  loadMenu();
}

function loadMenu(){
  menuButtons.innerHTML="";
  Object.keys(menu[currentCategory]).forEach((key,i)=>{
    const btn=document.createElement("button");
    btn.textContent=menu[currentCategory][key].title;
    btn.onclick=()=>loadItem(key);
    menuButtons.appendChild(btn);

    if(i===0) loadItem(key);
  });
}

function switchCategory(cat){
  currentCategory=cat;
  loadMenu();
}

function loadItem(key){
  currentItem=key;
  const d=menu[currentCategory][key];

  viewer.src=d.src;
  title.textContent=d.title;
  desc.textContent=d.desc;
  price.textContent="RM "+d.price;
}

/* CART */
function addToCart(){
  const d=menu[currentCategory][currentItem];
  const exist=cart.find(i=>i.title===d.title);

  if(exist){ exist.qty++; }
  else{ cart.push({...d,qty:1}); }

  alert("Added!");
}

/* SUMMARY */
function openSummary(){
  summaryPage.style.display="block";
  renderCart();
}

function renderCart(){
  orderList.innerHTML="";
  let total=0;

  cart.forEach((item,i)=>{
    const div=document.createElement("div");
    div.className="item";

    div.innerHTML=`
      ${item.title} 
      <div class="qty">
        <button onclick="changeQty(${i},-1)">-</button>
        ${item.qty}
        <button onclick="changeQty(${i},1)">+</button>
      </div>
      RM ${item.price*item.qty}
      <button class="delete" onclick="removeItem(${i})">X</button>
    `;

    orderList.appendChild(div);
    total+=item.price*item.qty;
  });

  totalDiv.textContent="Total: RM "+total;
  time.textContent="Time: "+new Date().toLocaleString();
}

function changeQty(i,d){
  cart[i].qty+=d;
  if(cart[i].qty<=0) cart.splice(i,1);
  renderCart();
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
}

function closeSummary(){
  summaryPage.style.display="none";
}

/* SALES TRACKER */
function saveSale(total){
  let sales=JSON.parse(localStorage.getItem("sales")||"[]");
  sales.push({total,date:new Date()});
  localStorage.setItem("sales",JSON.stringify(sales));
}

/* CHECKOUT */
function checkout(){
  const name=customerName.value||"Guest";
  const table=tableNo.value||"-";

  let text=`Order%0AName: ${name}%0ATable: ${table}%0A%0A`;
  let total=0;

  cart.forEach(item=>{
    text+=`${item.title} x${item.qty} RM ${item.price*item.qty}%0A`;
    total+=item.price*item.qty;
  });

  text+=`%0ATotal: RM ${total}`;

  saveSale(total);

  window.open("https://wa.me/60123456789?text="+text);

  cart=[];
  renderCart();
}

window.onload=loadMenu;
</script>

</body>
</html>
