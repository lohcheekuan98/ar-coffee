<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Coffee</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #f7f3ef;
}

/* START SCREEN */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #6f4e37;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#app { display: none; }

header {
  background: #6f4e37;
  color: white;
  padding: 14px;
  text-align: center;
}

model-viewer {
  width: 100%;
  height: 50vh;
}

/* BUTTONS */
.buttons {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  padding: 10px;
}

button {
  padding: 8px 14px;
  border-radius: 20px;
  border: none;
  background: #6f4e37;
  color: white;
  cursor: pointer;
  opacity: 0.7;
}

button.active {
  opacity: 1;
  transform: scale(1.05);
}

/* ORDER BUTTON */
#orderBtn {
  width: 90%;
  margin: 10px auto;
  display: block;
  padding: 12px;
  border-radius: 10px;
  background: #3b2f2f;
}

/* CART */
#cartBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #3b2f2f;
  padding: 12px;
  border-radius: 50%;
}

/* SUMMARY PAGE */
#summaryPage {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  display: none;
  padding: 20px;
  overflow: auto;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
  <h1>☕ AR Coffee</h1>
  <button onclick="startApp()">Start</button>
</div>

<!-- APP -->
<div id="app">

<header>☕ AR Coffee</header>

<model-viewer id="viewer" src="matchaCat.glb" ar camera-controls auto-rotate></model-viewer>

<div class="buttons" id="categoryButtons">
  <button onclick="switchCategory('drinks', this)" class="active">☕</button>
  <button onclick="switchCategory('cookies', this)">🍪</button>
  <button onclick="switchCategory('chocolate', this)">🍫</button>
</div>

<div class="buttons" id="drinkButtons"></div>

<h3 id="title"></h3>
<p id="desc"></p>
<strong id="price"></strong>

<button id="orderBtn" onclick="addToCart()">Add to Cart</button>

</div>

<!-- CART BUTTON -->
<button id="cartBtn" onclick="openSummary()">🛒</button>

<!-- SUMMARY -->
<div id="summaryPage">
  <h2>Your Order</h2>
  <div id="orderList"></div>
  <h3 id="total"></h3>

  <button onclick="checkout()">Checkout WhatsApp</button>
  <button onclick="closeSummary()">Close</button>
</div>

<script>
const viewer = document.getElementById("viewer");

let currentCategory = "drinks";
let currentItem = "";
let cart = [];

/* MENU */
const menu = {
  drinks: {
    matcha: { src: "matchaCat.glb", title: "Matcha", desc: "Matcha latte", price: 12 },
    mocha: { src: "mochaCat.glb", title: "Mocha", desc: "Chocolate coffee", price: 13 }
  },
  cookies: {
    cookie1: { src: "matchaCat.glb", title: "Cookie", desc: "Sweet cookie", price: 6 }
  },
  chocolate: {
    choco1: { src: "matchaCat.glb", title: "Hot Choco", desc: "Cocoa drink", price: 10 }
  }
};

/* START */
function startApp() {
  startScreen.style.display = "none";
  app.style.display = "block";
}

/* MENU GENERATE */
function generateMenu() {
  const container = document.getElementById("drinkButtons");
  container.innerHTML = "";

  const items = menu[currentCategory];

  Object.keys(items).forEach((key, i) => {
    const btn = document.createElement("button");
    btn.textContent = items[key].title;

    if (i === 0) {
      btn.classList.add("active");
      loadItem(key, btn, true);
    }

    btn.onclick = () => loadItem(key, btn);
    container.appendChild(btn);
  });
}

/* SWITCH */
function switchCategory(cat, btn) {
  currentCategory = cat;

  document.querySelectorAll("#categoryButtons button")
    .forEach(b => b.classList.remove("active"));

  btn.classList.add("active");
  generateMenu();
}

/* LOAD */
function loadItem(key, btn, auto=false) {
  currentItem = key;

  if (!auto) {
    document.querySelectorAll("#drinkButtons button")
      .forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }

  const d = menu[currentCategory][key];

  viewer.src = d.src;

  title.textContent = d.title;
  desc.textContent = d.desc;
  price.textContent = "RM " + d.price;
}

/* CART */
function addToCart() {
  const d = menu[currentCategory][currentItem];
  cart.push(d);
  alert(d.title + " added to cart!");
}

/* SUMMARY */
function openSummary() {
  summaryPage.style.display = "block";

  const list = document.getElementById("orderList");
  list.innerHTML = "";

  let total = 0;

  cart.forEach(item => {
    const div = document.createElement("div");
    div.textContent = item.title + " - RM " + item.price;
    list.appendChild(div);
    total += item.price;
  });

  document.getElementById("total").textContent = "Total: RM " + total;
}

function closeSummary() {
  summaryPage.style.display = "none";
}

/* CHECKOUT */
function checkout() {
  let text = "Order:%0A";
  let total = 0;

  cart.forEach(item => {
    text += item.title + " RM " + item.price + "%0A";
    total += item.price;
  });

  text += "%0ATotal: RM " + total;

  window.open("https://wa.me/60123456789?text=" + text);
}

/* INIT */
window.onload = generateMenu;
</script>

</body>
</html>
